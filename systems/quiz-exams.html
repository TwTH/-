<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="pageTitle">اختبارات سابقة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --font:"Cairo",sans-serif;
  --bg:#07101f;
  --bg2:#0d1a30;
  --bg3:#111f38;
  --surface:rgba(255,255,255,.04);
  --surface-hi:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.08);
  --border-hi:rgba(255,255,255,.16);
  --text:#dde6f5;
  --text-dim:rgba(221,230,245,.5);
  --accent:#00cdb4;
  --accent2:#6366f1;
  --wrong:#f43f5e;
  --r:16px;
  --card-shadow:0 8px 32px rgba(0,0,0,.4);
}
body.light {
  --bg:#f0ece4;
  --bg2:#faf7f2;
  --bg3:#fff;
  --surface:rgba(100,70,20,.05);
  --surface-hi:rgba(100,70,20,.09);
  --border:rgba(100,70,20,.13);
  --border-hi:rgba(100,70,20,.26);
  --text:#1a1005;
  --text-dim:#5a4530;
  --accent:#0a8c7a;
  --accent2:#5558d9;
  --wrong:#c0392b;
  --card-shadow:0 4px 20px rgba(100,70,20,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* BG glow */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 40% at 15% 10%,rgba(0,205,180,.06) 0%,transparent 55%),
             radial-gradient(ellipse 50% 35% at 85% 85%,rgba(99,102,241,.05) 0%,transparent 50%)}
body>*{position:relative;z-index:1}

/* ── THEME TOGGLE ── */
.toggle-wrap{position:fixed;top:14px;left:16px;z-index:100}
.ios-toggle{width:66px;height:32px;background:#142035;border-radius:999px;border:1.5px solid rgba(255,255,255,.12);cursor:pointer;position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 7px;box-shadow:0 2px 10px rgba(0,0,0,.35);transition:background .3s;overflow:hidden}
.ios-toggle .icon-sun,.ios-toggle .icon-moon{font-size:.82rem;z-index:1;transition:opacity .3s}
body.light .ios-toggle .icon-sun{opacity:1}body.light .ios-toggle .icon-moon{opacity:.3}
body:not(.light) .ios-toggle .icon-sun{opacity:.3}body:not(.light) .ios-toggle .icon-moon{opacity:1}
.ios-knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#f59e0b;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform .38s cubic-bezier(.34,1.56,.64,1);z-index:2}
body.light .ios-knob{transform:translateX(34px)}
body.light .ios-toggle{background:#e0d4c0;border-color:rgba(100,70,20,.25)}

/* ── HEADER ── */
header{text-align:center;padding:36px 20px 24px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,rgba(0,205,180,.06) 0%,rgba(99,102,241,.04) 100%)}
header h1{font-size:1.65rem;font-weight:900;background:linear-gradient(90deg,#00cdb4,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
header p{color:var(--text-dim);font-size:.85rem;font-weight:600;margin-bottom:20px}

/* ── HUD ── */
.hud{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap}
.hud-item{display:flex;align-items:center;gap:6px;padding:6px 18px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);font-weight:800;font-size:.82rem;transition:background .3s}
.hud-item span{font-size:.88rem;font-weight:900}
#timer{color:#f87171}
#accuracy{color:var(--accent)}
#streak{color:#fbbf24}
body.light .hud-item{background:var(--bg3);border-color:var(--border)}

/* ── TABS ── */
.tabs{display:flex;justify-content:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg)}
.tab{padding:9px 26px;border-radius:999px;border:1.5px solid var(--border-hi);background:var(--surface);color:var(--text-dim);font-family:var(--font);font-weight:800;font-size:.85rem;cursor:pointer;transition:all .22s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:linear-gradient(135deg,#00cdb4,#0ea5e9);color:#000;border-color:transparent;box-shadow:0 4px 18px rgba(0,205,180,.3)}
body.light .tab{background:var(--bg3);color:var(--text);border-color:var(--border-hi)}
body.light .tab.active{color:#fff}

/* ── SCREENS ── */
.screen{display:none;max-width:900px;margin:0 auto;padding:22px 16px 100px}
.screen.active{display:block;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── PROGRESS BAR ── */
.progress-wrap{height:3px;background:var(--border);border-radius:999px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00cdb4,#6366f1);border-radius:999px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* ── Q META ── */
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.q-num{font-size:.82rem;font-weight:800;color:var(--text-dim)}
.q-num b{color:var(--text)}
.freq-badge{padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:900}
.freq-red{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.28);color:#f87171}
.freq-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:#fbbf24}
.freq-green{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.22);color:#6ee7b7}

/* ── QUESTION CARD ── */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:22px 20px;margin-bottom:14px;box-shadow:var(--card-shadow);transition:background .3s}
body.light .q-card{background:var(--bg3);border-color:var(--border)}
.q-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.q-badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:999px;font-size:.7rem;font-weight:900;color:#fff}
.q-text{font-size:.96rem;font-weight:800;line-height:1.7;margin-bottom:10px;direction:ltr;text-align:left}
body.light .q-text{color:#1a1005}
.q-text-ar{font-size:.82rem;font-weight:600;color:var(--text-dim);line-height:1.6;margin-bottom:14px;padding:8px 12px 8px 8px;background:var(--surface);border-radius:10px;border-right:2.5px solid var(--accent)}
.sources{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.src-tag{padding:2px 9px;border-radius:999px;background:rgba(99,102,241,.09);border:1px solid rgba(99,102,241,.18);color:#a78bfa;font-size:.68rem;font-weight:800}

/* ── OPTIONS ── */
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.opt{padding:13px 18px;border-radius:13px;border:1.5px solid var(--border-hi);background:var(--surface);color:var(--text);font-family:var(--font);font-weight:700;font-size:.88rem;cursor:pointer;text-align:right;transition:all .18s;line-height:1.5}
body.light .opt{background:var(--bg);border-color:var(--border-hi);color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--surface-hi);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,205,180,.1)}
.opt:disabled{cursor:default}
.opt.correct{background:linear-gradient(135deg,#059669,#10b981)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 4px 16px rgba(16,185,129,.3)!important}
.opt.wrong{background:rgba(244,63,94,.12);border-color:#f43f5e;color:#f87171;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}

/* ── FEEDBACK ── */
.feedback{display:none;padding:12px 16px;border-radius:12px;margin-bottom:12px;font-size:.85rem;font-weight:700;line-height:1.6}
.feedback.show{display:block;animation:fadeUp .25s ease}
.feedback.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);color:#6ee7b7}
.feedback.err{background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.18);color:#fca5a5}
body.light .feedback.ok{background:rgba(10,140,122,.07);border-color:rgba(10,140,122,.18);color:#065f52}
body.light .feedback.err{background:rgba(192,57,43,.05);border-color:rgba(192,57,43,.18);color:#a93226}

/* ── NEXT BTN ── */
.next-btn{width:100%;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#00cdb4,#0ea5e9);color:#000;font-family:var(--font);font-weight:900;font-size:1rem;cursor:pointer;display:none;box-shadow:0 4px 18px rgba(0,205,180,.28);transition:transform .2s,box-shadow .2s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,205,180,.4)}
.next-btn.show{display:block;animation:fadeUp .28s ease}

/* ══════════ STATS ══════════ */
.stats-hero{text-align:center;margin-bottom:24px}
.stats-hero h2{font-size:1.05rem;font-weight:900;color:var(--accent);margin-bottom:4px}
.stats-hero p{font-size:.8rem;color:var(--text-dim);font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
@media(max-width:420px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;transition:background .3s}
body.light .stat-box{background:var(--bg3);border-color:var(--border)}
.stat-num{font-size:1.75rem;font-weight:900;margin-bottom:5px}
.stat-lbl{font-size:.7rem;color:var(--text-dim);font-weight:700}
.sec-title{font-size:.86rem;font-weight:900;color:var(--accent);margin:0 0 12px;display:flex;align-items:center;gap:6px}
.freq-list{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
.freq-row{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:11px 14px;display:flex;align-items:center;gap:10px;transition:all .2s}
.freq-row:hover{border-color:var(--border-hi);background:var(--bg3)}
body.light .freq-row{background:var(--bg3);border-color:var(--border)}
.freq-rank{font-size:.78rem;font-weight:900;width:22px;text-align:center;flex-shrink:0}
.freq-rank.g1{color:#fbbf24}.freq-rank.g2{color:#94a3b8}.freq-rank.g3{color:#d97706}
.freq-term{font-size:.86rem;font-weight:800;flex:1}
.freq-count{font-size:.72rem;font-weight:700;color:var(--text-dim);flex-shrink:0;white-space:nowrap}
.freq-bar-bg{width:80px;flex-shrink:0}
.freq-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:3px}
body.light .freq-bar-wrap{background:rgba(100,70,20,.09)}
.freq-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#00cdb4,#6366f1);width:0;transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.freq-pct{font-size:.66rem;font-weight:900;color:var(--accent);text-align:left}
.source-list{display:flex;flex-direction:column;gap:7px;margin-bottom:24px}
.source-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;font-size:.82rem;font-weight:700;transition:background .2s}
body.light .source-row{background:var(--bg3);border-color:var(--border)}
.source-name{color:var(--text)}
.source-count{color:var(--accent);font-weight:900}
.weak-box{background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.18);border-radius:14px;padding:14px 16px;margin-bottom:20px}
.weak-title{font-size:.82rem;color:#f87171;font-weight:800;margin-bottom:10px}
.weak-pills{display:flex;flex-wrap:wrap;gap:6px}
.weak-pill{padding:4px 12px;border-radius:999px;background:#f43f5e;color:#fff;font-size:.74rem;font-weight:800}
.no-weak{color:#10b981;font-weight:800;font-size:.84rem}

/* ══════════ PREDICT ══════════ */
.pz-header{display:flex;align-items:center;gap:10px;margin:0 0 12px}
.pz-badge{padding:4px 14px;border-radius:999px;font-size:.74rem;font-weight:900}
.pz-badge.red{background:rgba(244,63,94,.15);border:1.5px solid rgba(244,63,94,.35);color:#f87171}
.pz-badge.yellow{background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.3);color:#fbbf24}
.pz-badge.green{background:rgba(16,185,129,.09);border:1.5px solid rgba(16,185,129,.22);color:#6ee7b7}
.pz-label{font-size:.77rem;font-weight:700;color:var(--text-dim)}
.pz-divider{height:1px;background:var(--border);margin:18px 0}
.pq-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s}
body.light .pq-card{background:var(--bg3)}
.pq-card:hover{transform:translateY(-2px);box-shadow:var(--card-shadow)}
.pq-card.hot{border-color:rgba(244,63,94,.3)}
.pq-card.warm{border-color:rgba(245,158,11,.25)}
.pq-card.mild{border-color:rgba(99,102,241,.2)}
.pq-stripe{height:3px;width:100%}
.pq-body{padding:14px 16px}
.pq-question{font-size:.93rem;font-weight:800;line-height:1.65;color:var(--text);margin-bottom:7px;direction:ltr;text-align:left}
body.light .pq-question{color:#1a1005}
.pq-question-ar{font-size:.79rem;font-weight:600;color:var(--text-dim);line-height:1.55;margin-bottom:10px;padding-right:10px;border-right:2px solid rgba(255,255,255,.09)}
body.light .pq-question-ar{border-right-color:rgba(100,70,20,.18)}
.pq-ans{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.16);border-radius:10px;margin-bottom:8px}
body.light .pq-ans{background:rgba(10,140,122,.05);border-color:rgba(10,140,122,.16)}
.pq-ans-icon{font-size:.85rem;flex-shrink:0;margin-top:1px}
.pq-ans-text{font-size:.82rem;font-weight:800;color:#6ee7b7;line-height:1.5;direction:ltr;text-align:left}
body.light .pq-ans-text{color:#065f52}
.pq-ans-ar{font-size:.75rem;color:var(--text-dim);font-weight:600;margin-top:2px}
.pq-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.pq-tags{display:flex;gap:5px;flex-wrap:wrap}
.pq-tag{padding:2px 9px;border-radius:999px;font-size:.66rem;font-weight:800}
.pq-tag.freq{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.22);color:#f87171}
.pq-tag.gap{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.pq-tag.safe{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.16);color:#6ee7b7}
.pq-pct{font-size:.8rem;font-weight:900;flex-shrink:0}
.pq-srcs{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.pq-src{padding:2px 7px;border-radius:999px;font-size:.62rem;font-weight:800;background:rgba(99,102,241,.09);border:1px solid rgba(99,102,241,.18);color:#a78bfa}
.pz-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:8px;transition:background .18s}
.pz-toggle:hover{background:var(--surface-hi)}
body.light .pz-toggle{background:rgba(100,70,20,.04);border-color:var(--border)}
.pz-toggle-label{font-size:.8rem;font-weight:800;color:var(--text-dim)}
.pz-toggle-chevron{font-size:.68rem;color:var(--text-dim);transition:transform .22s}
.pz-toggle.open .pz-toggle-chevron{transform:rotate(180deg)}
.pz-collapsible{display:none}
.pz-collapsible.open{display:block;animation:fadeUp .3s ease}
.pred-disclaimer{text-align:center;font-size:.72rem;color:var(--text-dim);padding:22px;opacity:.4}

/* ── MISC ── */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--bg2);border:1px solid var(--border-hi);color:var(--text);padding:8px 20px;border-radius:999px;font-family:var(--font);font-weight:800;font-size:.84rem;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.score{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--border-hi);padding:7px 18px;border-radius:999px;font-weight:900;font-size:.92rem;box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:28;color:var(--text);transition:background .3s}
body.light .score{background:var(--bg3)}
.streak-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:300;padding:18px 36px;border-radius:20px;font-family:var(--font);font-weight:900;font-size:1.3rem;color:#fff;text-align:center;pointer-events:none;opacity:0}
.streak-banner.show{animation:streakPop .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes streakPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}60%{transform:translate(-50%,-50%) scale(.97)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.25)}}
.streak-5{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 8px 40px rgba(245,158,11,.45)}
.streak-10{background:linear-gradient(135deg,#6366f1,#ec4899);box-shadow:0 8px 40px rgba(99,102,241,.45)}
.footer{text-align:center;color:var(--text-dim);font-size:.78rem;padding:28px 20px;line-height:1.9}
.footer-sig{font-weight:900;color:var(--accent);font-size:.84rem;margin-bottom:2px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px}
body.light ::-webkit-scrollbar-thumb{background:rgba(180,120,60,.18)}

/* ══════════ BROWSE ══════════ */
.browse-grid{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
@media(max-width:700px){.browse-grid{grid-template-columns:1fr}}
.browse-col{display:flex;flex-direction:column;gap:10px}
.browse-col-title{font-size:.9rem;font-weight:900;color:var(--accent);padding:0 2px 8px;border-bottom:1px solid var(--border);margin-bottom:2px}
.exam-src-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.exam-src-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-2px)}
.exam-src-card.active-src{border-color:var(--accent);background:rgba(0,205,180,.07)}
body.light .exam-src-card{background:var(--bg3);border-color:var(--border)}
.exam-src-name{font-size:.78rem;font-weight:800;color:var(--text);flex:1;word-break:break-word}
.exam-src-count{font-size:.72rem;font-weight:900;color:var(--accent);background:rgba(0,205,180,.1);padding:2px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.browse-q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.browse-q-grid{grid-template-columns:1fr}}
.bq-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;transition:border-color .2s}
body.light .bq-card{background:var(--bg3);border-color:var(--border)}
.bq-card:hover{border-color:var(--border-hi)}
.bq-top{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.bq-num{font-size:.65rem;font-weight:900;color:var(--text-dim)}
.bq-freq{padding:2px 8px;border-radius:999px;font-size:.62rem;font-weight:900}
.bq-type{padding:2px 9px;border-radius:999px;font-size:.62rem;font-weight:900;color:#fff;margin-right:auto}
.bq-freq.r{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.25);color:#f87171}
.bq-freq.y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#fbbf24}
.bq-freq.g{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);color:#6ee7b7}
.bq-q{font-size:.77rem;font-weight:700;line-height:1.55;color:var(--text);direction:ltr;text-align:left;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
body.light .bq-q{color:#1a1005}
.bq-ans{font-size:.72rem;font-weight:800;color:#6ee7b7;padding:6px 10px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.14);border-radius:8px;direction:ltr;text-align:left;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
body.light .bq-ans{color:#065f52}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="streak-banner" id="streakBanner"></div>
<div class="toggle-wrap">
  <div class="ios-toggle" onclick="toggleTheme()"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span><div class="ios-knob"></div></div>
</div>

<header>
  <h1 id="mainTitle">📝 كويز — أمن الشبكات وتقنيات التشفير</h1>
  <p id="mainSubtitle">تال 1413</p>
  <div class="hud">
    <div class="hud-item">⏱️ <span id="timer">00:00</span></div>
    <div class="hud-item">🎯 <span id="accuracy">100%</span></div>
    <div class="hud-item">🔥 <span id="streak">0</span></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tabQ" onclick="switchTab('quiz')">📝 أسئلة</button>
  <button class="tab" id="tabB" onclick="switchTab('browse')">📚 استعراض</button>
</div>

<!-- QUIZ -->
<div class="screen active" id="quizScreen">
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="q-meta">
    <div class="q-num">سؤال <b id="qNum">1</b> / <b id="qTotal">?</b></div>
    <div id="qFreqBadge" class="freq-badge"></div>
  </div>
  <div class="q-card" id="qCard">
    <div class="q-badges">
      <div id="qChapterBadge" class="q-badge"></div>
      <div id="qTypeBadge" class="q-badge" style="background:#6366f1"></div>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="q-text-ar" id="qTextAr"></div>
    <div class="sources" id="qSources"></div>
    <div class="options" id="qOpts"></div>
    <div class="feedback" id="qFeedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">التالي ➡️</button>
  </div>
</div>

<!-- BROWSE -->
<div class="screen" id="browseScreen">
  <div class="browse-grid">
    <!-- RIGHT: Exam sources -->
    <div class="browse-col">
      <div class="browse-col-title">📁 الاختبارات</div>
      <div id="browseExams"></div>
    </div>
    <!-- LEFT: All questions -->
    <div class="browse-col">
      <div class="browse-col-title">📋 جميع الأسئلة</div>
      <div class="browse-q-grid" id="browseQuestions"></div>
    </div>
  </div>
</div>

<div class="score">🎯 <span id="scoreVal">0</span> / <span id="scoreTotal">0</span></div>
<div class="footer"><div class="footer-sig">🎓 إعداد: بدر الدوسري</div><div style="font-style:italic">دعواتكم الصالحة في ظهر الغيب 🤲</div><div id="footerInfo" style="margin-top:8px;font-size:.76rem"></div></div>

<script>
/* ══════════════════════════════════════════
   🏷️ معلومات المادة
══════════════════════════════════════════ */
const COURSE_META = {
  courseTitle: "أمن الشبكات وتقنيات التشفير — تال 1413",   // مثال: "IT310 - Information Security"
  semester:    ""    // مثال: "الفصل الثاني 1446"
};

/* ══════════════════════════════════════════
   📋 الاختبارات السابقة
   PASTE pastExams[] FROM prompt_exams HERE
══════════════════════════════════════════ */
const pastExams = [
// ════════════════════════════════════════
// 📌 الصق pastExams[] هنا
// ════════════════════════════════════════
];

/* ══ ENGINE ══ */
const cc=s=>s?s.replace(/\[cite:[^\]]*\]/g,'').replace(/\[\d+(?:,\s*\d+)*\]/g,'').trim():s;
let isLight=false,timerInt=null,t0=null,correct=0,wrong=0,streakN=0,bestStreak=0,termFails={};
const AC=window.AudioContext||window.webkitAudioContext,ac=new AC();
function playSound(ok){try{if(ac.state==='suspended')ac.resume();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);if(ok){o.type='sine';o.frequency.setValueAtTime(600,ac.currentTime);o.frequency.exponentialRampToValueAtTime(1600,ac.currentTime+.22);g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4)}else{o.type='sawtooth';o.frequency.setValueAtTime(280,ac.currentTime);o.frequency.exponentialRampToValueAtTime(130,ac.currentTime+.25);g.gain.setValueAtTime(.07,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3)}o.start();o.stop(ac.currentTime+.45)}catch(e){}}
function startTimer(){if(!timerInt){t0=Date.now();timerInt=setInterval(()=>{const e=Math.floor((Date.now()-t0)/1000);document.getElementById('timer').textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0')},1000)}}
function updAcc(){const t=correct+wrong;document.getElementById('accuracy').textContent=(t===0?100:Math.round(correct/t*100))+'%'}
function updStreak(ok){streakN=ok?streakN+1:0;if(streakN>bestStreak)bestStreak=streakN;document.getElementById('streak').textContent=streakN;if(ok&&(streakN===5||streakN===10)){const b=document.getElementById('streakBanner');b.className='streak-banner '+(streakN>=10?'streak-10':'streak-5');b.textContent=streakN>=10?`🔥🔥 ستريك ${streakN}! أسطوري!`:`🔥 ستريك ${streakN}! حماس!`;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1100);confetti({particleCount:30,spread:80,startVelocity:25,zIndex:301,origin:{x:.5,y:.4},colors:['#00cdb4','#6366f1','#f59e0b']})}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function toggleTheme(){isLight=!isLight;document.body.classList.toggle('light',isLight)}

/* ── GET ALL (no filter) ── */
function getFiltered(){return pastExams}

/* ── QUIZ ── */
const typeColors={MCQ:'#6366f1',TF:'#0d9488',Scenario:'#b45309',Problem:'#be185d'};
const chColors=['#0d9488','#6366f1','#b45309','#be185d','#0369a1','#15803d'];
let chColorMap={};
let q=[],qi=0,answered=false;
function getChColor(cat){if(!chColorMap[cat]){const keys=Object.keys(chColorMap);chColorMap[cat]=chColors[keys.length%chColors.length]}return chColorMap[cat]}
function resetQuiz(){q=[];qi=0;answered=false;correct=0;wrong=0;streakN=0;document.getElementById('scoreVal').textContent=0;document.getElementById('accuracy').textContent='100%';document.getElementById('streak').textContent='0';initQuiz()}
function initQuiz(){
  const filtered=getFiltered();
  if(!filtered.length){document.getElementById('qCard').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-dim);font-weight:700">😅 ما في أسئلة مسجّلة بعد</div>';document.getElementById('qTotal').textContent=0;document.getElementById('scoreTotal').textContent=0;return}
  const grouped={};filtered.forEach(x=>{const k=x.freq||0;if(!grouped[k])grouped[k]=[];grouped[k].push(x)});
  q=Object.keys(grouped).map(Number).sort((a,b)=>b-a).flatMap(k=>shuffle(grouped[k]));
  q=q.map(x=>({...x,question:cc(x.question),questionAr:cc(x.questionAr||''),answer:cc(x.answer),answerAr:cc(x.answerAr||'')}));
  document.getElementById('qTotal').textContent=q.length;
  document.getElementById('scoreTotal').textContent=q.length;
  renderQ();
}
function updateProgress(){
  const pct=q.length?Math.round((qi/q.length)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
}
function renderQ(){
  if(qi>=q.length){confetti({particleCount:80,spread:110,startVelocity:35,colors:['#00cdb4','#6366f1','#f59e0b'],origin:{x:.5,y:.4}});showToast('🎉 أنهيت كل الأسئلة!');return}
  answered=false;
  updateProgress();
  const it=q[qi];
  document.getElementById('qNum').textContent=qi+1;
  const fc=it.freq>=3?'freq-red':it.freq===2?'freq-yellow':'freq-green';
  const fb=document.getElementById('qFreqBadge');fb.className='freq-badge '+fc;fb.textContent=it.freqLabel+' — '+it.freq+(it.freq===1?' مرة':' مرات');
  const cb=document.getElementById('qChapterBadge');cb.textContent=it.cat;cb.style.background=getChColor(it.cat);
  const tb=document.getElementById('qTypeBadge');tb.textContent=it.type;tb.style.background=typeColors[it.type]||'#6366f1';
  document.getElementById('qText').textContent=it.question;
  const qar=document.getElementById('qTextAr');qar.textContent=it.questionAr;qar.style.display=it.questionAr?'':'none';
  document.getElementById('qSources').innerHTML=(it.examSources||[]).map(s=>`<span class="src-tag">📄 ${s}</span>`).join('');
  const f2=document.getElementById('qFeedback');f2.className='feedback';f2.innerHTML='';
  document.getElementById('nextBtn').className='next-btn';
  const opts=document.getElementById('qOpts');opts.innerHTML='';
  let choices;
  if(it.type==='TF'){choices=shuffle(['صح','خطأ'])}
  else{const others=pastExams.filter(x=>cc(x.answer)!==it.answer).map(x=>cc(x.answer));const w3=shuffle([...new Set(others)]).slice(0,3);choices=shuffle([it.answer,...w3])}
  choices.forEach(opt=>{
    const b=document.createElement('button');b.className='opt';b.textContent=opt;
    b.onclick=()=>{
      if(answered)return;answered=true;startTimer();
      document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      const isOk=it.type==='TF'?(it.answer.toLowerCase()==='true'||it.answer==='صح')===(['صح','true'].includes(opt.toLowerCase())):opt===it.answer;
      if(isOk){b.classList.add('correct');playSound(true);correct++;updAcc();updStreak(true);document.getElementById('scoreVal').textContent=correct;f2.className='feedback ok show';f2.innerHTML='✅ صح! — '+it.answerAr;showToast('✅ أحسنت!')}
      else{b.classList.add('wrong');document.querySelectorAll('.opt').forEach(x=>{if(x.textContent===it.answer)x.classList.add('correct')});playSound(false);wrong++;termFails[it.cat]=(termFails[it.cat]||0)+1;updAcc();updStreak(false);f2.className='feedback err show';f2.innerHTML='❌ الصحيح: <b>'+it.answer+'</b> — '+it.answerAr;showToast('❌ راجع: '+it.cat);refreshWeak()}
      document.getElementById('nextBtn').className='next-btn show';
    };
    opts.appendChild(b);
  });
  const card=document.getElementById('qCard');card.style.animation='none';void card.offsetWidth;card.style.animation='';
}
function nextQ(){qi++;renderQ()}
function refreshWeak(){const wp=document.getElementById('weakPills');if(!wp)return;const fails=Object.entries(termFails).sort((a,b)=>b[1]-a[1]);if(!fails.length){wp.innerHTML='<span class="no-weak">ما أخطأت — ممتاز!</span>';return}wp.innerHTML=fails.map(([t,n])=>`<span class="weak-pill">${t} (${n}×)</span>`).join('')}

/* ── BROWSE ── */
let browseBuilt=false,activeSrc='all';
function buildBrowse(){
  if(browseBuilt)return;browseBuilt=true;
  renderBrowse();
}
function renderBrowse(){
  const all=pastExams;
  const sources=[...new Set(all.flatMap(x=>x.examSources||[]))];
  // exam source cards
  const ec=document.getElementById('browseExams');
  const allCard=`<div class="exam-src-card ${activeSrc==='all'?'active-src':''}" onclick="setBrowseSrc('all',this)"><span class="exam-src-name">📚 جميع الاختبارات</span></div>`;
  const srcCards=sources.map(s=>{
    return`<div class="exam-src-card ${activeSrc===s?'active-src':''}" onclick="setBrowseSrc('${s.replace(/'/g,"\\'")}',this)"><span class="exam-src-name">📄 ${s}</span></div>`;
  }).join('');
  ec.innerHTML=allCard+srcCards;
  // questions grid
  const filtered=activeSrc==='all'?all:all.filter(x=>(x.examSources||[]).includes(activeSrc));
  const sorted=[...filtered].sort((a,b)=>b.freq-a.freq);
  const qg=document.getElementById('browseQuestions');
  if(!sorted.length){qg.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text-dim);font-weight:700">😅 لا توجد أسئلة</div>';return}
  qg.innerHTML=sorted.map((p,i)=>{
    const fc=p.freq>=3?'r':p.freq===2?'y':'g';
    const typeColors={MCQ:'#6366f1',TF:'#0d9488',Scenario:'#b45309',Problem:'#be185d'};
    const tc=typeColors[p.type]||'#6366f1';
    return`<div class="bq-card"><div class="bq-top"><span class="bq-num">${i+1}</span><span class="bq-freq ${fc}">${p.freqLabel}</span><span class="bq-type" style="background:${tc}">${p.type||'MCQ'}</span></div><div class="bq-q">${cc(p.question)}</div><div class="bq-ans">${cc(p.answer)}</div></div>`;
  }).join('');
}
function setBrowseSrc(src,btn){
  activeSrc=src;
  document.querySelectorAll('.exam-src-card').forEach(b=>b.classList.remove('active-src'));
  btn.classList.add('active-src');
  renderBrowse();
}

/* ── TAB SWITCH ── */
function switchTab(t){
  document.getElementById('quizScreen').classList.toggle('active',t==='quiz');
  document.getElementById('browseScreen').classList.toggle('active',t==='browse');
  document.getElementById('tabQ').classList.toggle('active',t==='quiz');
  document.getElementById('tabB').classList.toggle('active',t==='browse');
  if(t==='browse')buildBrowse();
}

/* ── APPLY META ── */
(function(){
  const t=COURSE_META.courseTitle||'';
  const sem=COURSE_META.semester||'';
  if(t){document.getElementById('pageTitle').textContent='اختبارات سابقة – '+t;document.getElementById('mainTitle').textContent='📝 اختبارات سابقة — '+t;document.getElementById('mainSubtitle').textContent=sem||'أسئلة الاختبارات الحقيقية';}
  const fi=document.getElementById('footerInfo');if(fi&&t)fi.innerHTML=`📚 ${t}${sem?'<br/>'+sem:''}`;
})();

/* ── INIT ── */
initQuiz();
</script>
</body>
</html>
